<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Laboratorio de Entrelazamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg-grid: #0e1320;
    --surface: #131820;
    --surface-2: #1a2230;
    --border: #1f2933;
    --text: #e6edf3;
    --text-dim: #8b97a8;
    --text-faint: #4a5563;
    --accent: #00d4ff;
    --accent-glow: rgba(0, 212, 255, 0.35);
    --accent-soft: rgba(0, 212, 255, 0.08);
    --station-a: #00d4ff;
    --station-a-glow: rgba(0, 212, 255, 0.35);
    --station-b: #ff8a4c;
    --station-b-glow: rgba(255, 138, 76, 0.35);
    --positive: #4ade80;
    --negative: #f472b6;
    --warning: #fbbf24;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,212,255,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,138,76,0.05), transparent 40%),
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--text-dim);
    padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 100px; background: var(--surface);
  }
  .badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* ============ PRESENTER ============ */
  .presenter {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 22px 28px;
    gap: 18px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
  }
  .header h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(24px, 3vw, 38px);
    font-variation-settings: "opsz" 144, "SOFT" 30;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .header h1 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 144, "SOFT" 100;
  }
  .header .subtitle {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-top: 6px;
  }
  .header .meta {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .header .meta #modeLabel { color: var(--accent); }

  .main-grid {
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    gap: 18px;
    align-items: stretch;
  }

  .qr-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .qr-panel::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 30%, var(--accent-soft), transparent 60%);
    pointer-events: none;
  }
  .qr-panel .label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.25em;
  }
  .qr-panel .title {
    font-family: var(--font-display);
    font-size: 18px;
    font-style: italic;
    font-weight: 400;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
  }
  .qr-wrap {
    background: white;
    padding: 11px;
    border-radius: 4px;
    position: relative;
    z-index: 1;
  }
  .qr-wrap img { display: block; width: 190px; height: 190px; }
  .qr-url {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    word-break: break-all;
    text-align: center;
    max-width: 100%;
    line-height: 1.5;
  }
  .assignment-note {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    text-align: center;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    width: 100%;
    line-height: 1.6;
  }
  .assignment-note .a { color: var(--station-a); }
  .assignment-note .b { color: var(--station-b); }

  .center-panel {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 14px;
    min-width: 0;
  }

  .joint-stats {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 20px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 14px;
    align-items: center;
  }
  .joint-stats .rho-block .label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 2px;
  }
  .joint-stats .rho-block .value {
    font-family: var(--font-display);
    font-size: 60px;
    font-weight: 400;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 24px var(--accent-glow);
    font-variation-settings: "opsz" 144;
  }
  .joint-stats .rho-block .unit {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .joint-stats .pairs-block { text-align: right; }
  .joint-stats .pairs-block .label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
  .joint-stats .pairs-block .value {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
    font-variation-settings: "opsz" 144;
    margin-top: 4px;
  }
  .joint-stats .pairs-block .sub {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .plot-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    position: relative;
    min-height: 320px;
    display: flex;
    flex-direction: column;
  }
  .plot-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .plot-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
  .plot-legend {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-faint);
    display: flex;
    gap: 14px;
  }
  .plot-legend .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    vertical-align: middle;
    margin-right: 4px;
  }
  .plot-legend .dot.match { background: var(--positive); box-shadow: 0 0 6px rgba(74,222,128,0.4); }
  .plot-legend .dot.anti { background: var(--negative); box-shadow: 0 0 6px rgba(244,114,182,0.4); }
  #scatter { flex: 1; width: 100%; display: block; }

  /* ============ COUNT DISPLAY (modo cuántico) ============ */
  .count-display {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 12px 4px 4px 4px;
  }
  .count-row {
    display: grid;
    grid-template-columns: 180px 1fr 100px;
    align-items: center;
    gap: 16px;
  }
  .count-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    line-height: 1.4;
  }
  .count-label .formula {
    color: var(--text-faint);
    font-size: 10px;
    display: block;
    margin-top: 2px;
  }
  .count-bar-wrap {
    height: 36px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .count-bar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    transition: width 0.4s ease-out;
    background: var(--positive);
    box-shadow: 0 0 16px rgba(74,222,128,0.4);
  }
  .count-bar.opp {
    background: var(--negative);
    box-shadow: 0 0 16px rgba(244,114,182,0.4);
  }
  .count-bar-inner {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    padding-left: 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: rgba(10, 14, 20, 0.9);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .count-bar-inner.empty {
    color: var(--text-faint);
  }
  .count-value {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    text-align: right;
    line-height: 1;
    font-variation-settings: "opsz" 144;
  }
  .count-value .pct {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }
  .count-value.same { color: var(--positive); }
  .count-value.opp { color: var(--negative); }

  .count-formula {
    margin-top: auto;
    padding: 16px 18px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .count-formula .eq {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--accent);
    margin-left: 6px;
    font-weight: 400;
    font-variation-settings: "opsz" 144;
  }
  .count-total {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 2px;
  }
  .count-total span { color: var(--accent); font-size: 14px; }

  .station-panels {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
  }
  .station-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
  }
  .station-panel.station-a { border-left: 3px solid var(--station-a); }
  .station-panel.station-b { border-left: 3px solid var(--station-b); }
  .station-panel .header-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .station-panel .name {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 22px;
    font-weight: 400;
    font-variation-settings: "opsz" 144, "SOFT" 100;
  }
  .station-panel.station-a .name { color: var(--station-a); }
  .station-panel.station-b .name { color: var(--station-b); }
  .station-panel .count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }
  .station-panel .stream {
    font-family: var(--font-mono);
    font-size: 18px;
    line-height: 1.3;
    letter-spacing: 0.04em;
    color: var(--text);
    flex: 1;
    word-break: break-all;
    overflow: hidden;
  }
  .station-panel .stream .up { color: var(--positive); }
  .station-panel .stream .down { color: var(--negative); }
  .station-panel .marginal {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .station-panel .marginal span { color: var(--text-dim); }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
  }
  .controls .group-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-right: 6px;
  }
  .mode-btn, .action-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .mode-btn:hover, .action-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }
  .mode-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .mode-btn.quantum {
    border-color: rgba(255,138,76,0.3);
    color: rgba(255,194,150,0.9);
  }
  .mode-btn.quantum:hover {
    color: var(--station-b);
    border-color: var(--station-b);
  }
  .mode-btn.quantum.active {
    background: rgba(255,138,76,0.1);
    border-color: var(--station-b);
    color: var(--station-b);
  }
  .action-btn.danger {
    margin-left: auto;
    color: var(--text-faint);
  }
  .action-btn.danger:hover {
    color: var(--negative);
    border-color: var(--negative);
  }

  /* ============ PARTICIPANT ============ */
  .participant {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 18px;
    max-width: 480px;
    margin: 0 auto;
  }
  .station-header {
    text-align: center;
    padding: 22px 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .station-header.is-a { border-color: var(--station-a); }
  .station-header.is-b { border-color: var(--station-b); }
  .station-header::before {
    content: ''; position: absolute; inset: 0;
    pointer-events: none;
  }
  .station-header.is-a::before {
    background: radial-gradient(circle at 50% 50%, rgba(0,212,255,0.12), transparent 60%);
  }
  .station-header.is-b::before {
    background: radial-gradient(circle at 50% 50%, rgba(255,138,76,0.12), transparent 60%);
  }
  .station-header .small {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.25em;
    margin-bottom: 8px;
    position: relative;
  }
  .station-header .name {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 44px;
    font-weight: 400;
    line-height: 1;
    font-variation-settings: "opsz" 144, "SOFT" 100;
    position: relative;
  }
  .station-header.is-a .name { color: var(--station-a); text-shadow: 0 0 24px var(--station-a-glow); }
  .station-header.is-b .name { color: var(--station-b); text-shadow: 0 0 24px var(--station-b-glow); }
  .station-header .hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-top: 10px;
    position: relative;
  }

  .last-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 20px;
    margin-bottom: 16px;
    text-align: center;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .last-result .label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }
  .last-result .arrow {
    font-size: 70px;
    line-height: 1;
    font-family: var(--font-display);
    font-weight: 400;
  }
  .last-result .arrow.up { color: var(--positive); text-shadow: 0 0 32px rgba(74,222,128,0.5); }
  .last-result .arrow.down { color: var(--negative); text-shadow: 0 0 32px rgba(244,114,182,0.5); }
  .last-result .value {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.15em;
  }
  .last-result.empty .arrow { color: var(--text-faint); }
  .last-result.empty .arrow::before { content: '—'; }
  .last-result.empty .value { display: none; }

  .measure-btn {
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 26px 24px;
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.01em;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s ease;
    box-shadow: 0 0 0 0 var(--accent-glow);
    position: relative;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .measure-btn.is-a { background: var(--station-a); }
  .measure-btn.is-b { background: var(--station-b); }
  .measure-btn:active { transform: scale(0.98); }
  .measure-btn.is-a:active { box-shadow: 0 0 40px 0 var(--station-a-glow); }
  .measure-btn.is-b:active { box-shadow: 0 0 40px 0 var(--station-b-glow); }
  .measure-btn:disabled {
    background: var(--surface);
    color: var(--text-faint);
    cursor: not-allowed;
  }
  .measure-btn .label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    margin-bottom: 6px;
    opacity: 0.75;
  }

  .my-stream {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .my-stream .title {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    text-align: center;
  }
  .my-stream .arrows {
    font-family: var(--font-mono);
    font-size: 20px;
    text-align: center;
    line-height: 1.3;
    word-break: break-all;
    min-height: 26px;
    color: var(--text-faint);
  }
  .my-stream .arrows .up { color: var(--positive); }
  .my-stream .arrows .down { color: var(--negative); }

  .p-stats {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .p-stat { text-align: center; }
  .p-stat .label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }
  .p-stat .value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.1;
  }
  .p-stat .value.a { color: var(--station-a); }
  .p-stat .value.b { color: var(--station-b); }

  .mode-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 14px;
  }
  .mode-info span { color: var(--accent); }

  .switch-link {
    text-align: center;
    margin-top: auto;

<script type="module">

} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// ============================================================
// Identidad y asignación de grupo (persistente en el dispositivo)

const USER_ID = (() => {

function getGroupAssignment() {

// ============================================================
// Generación de pares
// Clásicos/independientes: continuos en [-1, +1]
// Cuánticos: discretos ±1
// ============================================================
function randSign() { return Math.random() < 0.5 ? 1 : -1; }
function gauss(sigma) {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

function isQuantumMode(mode) {
  return mode === 'quantum_pos' || mode === 'quantum_neg';
}

function generatePair(mode) {
  if (mode === 'independent') {
    return { a: Math.random() * 2 - 1, b: Math.random() * 2 - 1 };
  } else if (mode === 'classical_pos') {
    const a = Math.random() * 2 - 1;
    return { a, b: clamp(a + gauss(0.18), -1, 1) };
  } else if (mode === 'classical_neg') {
    const a = Math.random() * 2 - 1;
    return { a, b: clamp(-a + gauss(0.18), -1, 1) };
  } else if (mode === 'quantum_pos') {
    // Estado de Bell |Φ+⟩: idénticos siempre
    const a = randSign();
    return { a, b: a };
  } else if (mode === 'quantum_neg') {
    // Singlete |Ψ−⟩: opuestos siempre
    const a = randSign();
    return { a, b: -a };
  }
  return { a: randSign(), b: randSign() };
}

// ============================================================
// Estadística
// ============================================================
function pearsonDiscrete(pairs) {
  const n = pairs.length;
  if (n < 2) return 0;
  let sa = 0, sb = 0, saa = 0, sbb = 0, sab = 0;
  for (const p of pairs) {
    sa += p.a; sb += p.b;
    saa += p.a * p.a; sbb += p.b * p.b;
    sab += p.a * p.b;
  }
  const num = n * sab - sa * sb;
  const den = Math.sqrt((n * saa - sa * sa) * (n * sbb - sb * sb));
  if (den === 0) return 0;
  return num / den;
}
function formatRho(r) {
  if (!isFinite(r)) return '—';
  return (r >= 0 ? '+' : '') + r.toFixed(2);
}

// ============================================================
// Parsear pares desde snapshot
// ============================================================
function parsePairs(snapshot, resetAt) {
  const val = snapshot.val();
  if (!val) return [];
  const arr = [];
  for (const k of Object.keys(val)) {
    const p = val[k];
    if (!p || typeof p.a !== 'number' || typeof p.b !== 'number') continue;
    if ((p.createdAt || 0) < (resetAt || 0)) continue;
    arr.push({
      id: k,
      a: p.a, b: p.b,
      aClaimedBy: p.aClaimedBy || null,
      bClaimedBy: p.bClaimedBy || null,
      aClaimedAt: p.aClaimedAt || null,
      bClaimedAt: p.bClaimedAt || null,
      createdAt: p.createdAt || 0
    });
  }
  arr.sort((x, y) => x.createdAt - y.createdAt);
  return arr;
}

// ============================================================
// Lógica de medición
// Clásico/independiente: el participante genera un par completo localmente
// Cuántico: se reclama un lado de un par entrelazado (sistema dos estaciones)
// ============================================================
async function performMeasurement(group, mode) {
  // En modos clásicos: el participante genera el par completo
  if (!isQuantumMode(mode)) {
    const { a, b } = generatePair(mode);
    const newPair = {
      a, b,
      aClaimedBy: USER_ID,
      bClaimedBy: USER_ID,
      aClaimedAt: Date.now(),
      bClaimedAt: Date.now(),
      createdAt: Date.now()
    };
    await push(pairsRef, newPair);
    return { a, b, isQuantum: false };
  }

  // En modos cuánticos: claim de un lado
  const myField = group === 'A' ? 'aClaimedBy' : 'bClaimedBy';
  const myAtField = group === 'A' ? 'aClaimedAt' : 'bClaimedAt';

  const snap = await get(pairsRef);
  const all = parsePairs(snap, 0);

  const candidates = all.filter(p => !p[myField]);

  for (const cand of candidates) {
    const pRef = ref(db, `lab/pairs/${cand.id}`);
    const tx = await runTransaction(pRef, (current) => {
      if (!current) return;
      if (current[myField]) return;
      current[myField] = USER_ID;
      current[myAtField] = Date.now();
      return current;
    });
    if (tx.committed && tx.snapshot.exists()) {
      const v = tx.snapshot.val();
      const val = group === 'A' ? v.a : v.b;
      return { a: val, b: null, isQuantum: true, group };
    }
  }

  // No había par disponible: crear uno
  const { a, b } = generatePair(mode);
  const newPair = {
    a, b,
    aClaimedBy: group === 'A' ? USER_ID : null,
    bClaimedBy: group === 'B' ? USER_ID : null,
    aClaimedAt: group === 'A' ? Date.now() : null,
    bClaimedAt: group === 'B' ? Date.now() : null,
    createdAt: Date.now()
  };
  await push(pairsRef, newPair);
  const val = group === 'A' ? a : b;
  return { a: val, b: null, isQuantum: true, group };
}

// ============================================================
// Scatter unificado: bucketing inteligente
// - Datos continuos (modos clásicos): puntos pequeños, forman diagonal suave
// - Datos discretos (modos cuánticos): se acumulan en 2 o 4 esquinas con conteo grande
// ============================================================
function drawScatter(canvas, pairs) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  if (rect.width <= 0 || rect.height <= 0) return;
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const W = rect.width, H = rect.height;
  const pad = 44;
  ctx.clearRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const x = pad + (W - 2*pad) * (i / 10);
    const y = pad + (H - 2*pad) * (i / 10);
    ctx.beginPath(); ctx.moveTo(x, pad); ctx.lineTo(x, H - pad); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - pad, y); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  const cx = pad + (W - 2*pad) * 0.5;
  const cy = pad + (H - 2*pad) * 0.5;
  ctx.beginPath(); ctx.moveTo(pad, cy); ctx.lineTo(W - pad, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, pad); ctx.lineTo(cx, H - pad); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.strokeRect(pad, pad, W - 2*pad, H - 2*pad);

  ctx.fillStyle = 'rgba(139,151,168,0.85)';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('A', cx, H - pad + 22);
  ctx.fillText('+1', W - pad, H - pad + 16);
  ctx.fillText('−1', pad, H - pad + 16);
  ctx.save();
  ctx.translate(pad - 28, cy);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('B', 0, 0);
  ctx.restore();
  ctx.textAlign = 'right';
  ctx.fillText('+1', pad - 6, pad + 4);
  ctx.fillText('−1', pad - 6, H - pad + 4);

  // Bucketing: puntos cercanos se agrupan
  const cellSize = 10;
  const buckets = new Map();
  for (const p of pairs) {
    const px = pad + ((p.a + 1) / 2) * (W - 2*pad);
    const py = pad + (1 - (p.b + 1) / 2) * (H - 2*pad);
    const bx = Math.round(px / cellSize) * cellSize;
    const by = Math.round(py / cellSize) * cellSize;
    const key = bx + ',' + by;
    if (!buckets.has(key)) {
      buckets.set(key, { x: bx, y: by, count: 0, a: p.a, b: p.b });
    }
    buckets.get(key).count++;
  }

  // Renderizar buckets, los más pequeños primero
  const sortedBuckets = Array.from(buckets.values()).sort((x, y) => x.count - y.count);
  const totalPoints = pairs.length;

  for (const b of sortedBuckets) {
    const isCorrelated = b.a * b.b >= 0;
    const color = isCorrelated ? '#4ade80' : '#f472b6';
    const glowColor = isCorrelated ? 'rgba(74,222,128,0.4)' : 'rgba(244,114,182,0.4)';

    if (b.count < 5) {
      // Punto pequeño individual (modo continuo)
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.55 + Math.min(0.4, b.count * 0.08);
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Cluster grande: círculo escalado por sqrt(count)
      const r = Math.min(Math.min(W, H) * 0.16, 10 + Math.sqrt(b.count) * 4.5);

      // Glow exterior
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r * 2);
      grad.addColorStop(0, glowColor);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, r * 2, 0, Math.PI * 2);
      ctx.fill();

      // Círculo principal
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
      ctx.fill();

      // Número dentro
      if (r >= 14) {
        ctx.fillStyle = 'rgba(10, 14, 20, 0.92)';
        ctx.font = `bold ${Math.min(r * 0.9, 30)}px Fraunces, serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.count.toString(), b.x, b.y + 2);
      }
    }
  }
}

// ============================================================
// Render stream de flechas
// ============================================================
function renderStream(container, values, max = 28) {
  const recent = values.slice(-max);
  if (recent.length === 0) {
    container.innerHTML = '<span style="color: var(--text-faint)">—</span>';
    return;
  }
  container.innerHTML = recent.map(v =>
    v > 0 ? '<span class="up">↑</span>' : '<span class="down">↓</span>'
  ).join(' ');
}

}

    if (r > 0.15) { rhoEl.style.color = 'var(--positive)'; rhoEl.style.textShadow = '0 0 24px rgba(74,222,128,0.45)'; }
    else if (r < -0.15) { rhoEl.style.color = 'var(--negative)'; rhoEl.style.textShadow = '0 0 24px rgba(244,114,182,0.45)'; }
    else { rhoEl.style.color = 'var(--accent)'; rhoEl.style.textShadow = '0 0 24px var(--accent-glow)'; }

    pairsEl.textContent = completePairs.length;

    // Pares pendientes (faltando un lado)
    const pendingA = allPairs.filter(p => p.aClaimedBy && !p.bClaimedBy).length;
    const pendingB = allPairs.filter(p => !p.aClaimedBy && p.bClaimedBy).length;
    const pendingEl = document.getElementById('pendingValue');
    if (pendingA + pendingB > 0) {
      pendingEl.textContent = `Pendientes · A: ${pendingA} · B: ${pendingB}`;
    } else {
      pendingEl.textContent = '';
    }

    const aParts = new Set(allPairs.filter(p => p.aClaimedBy).map(p => p.aClaimedBy));
    const bParts = new Set(allPairs.filter(p => p.bClaimedBy).map(p => p.bClaimedBy));
    partEl.textContent = `${aParts.size + bParts.size} participantes (A: ${aParts.size} · B: ${bParts.size})`;

    countAEl.textContent = `${aValues.length} med`;
    countBEl.textContent = `${bValues.length} med`;

    renderStream(streamAEl, aValues);
    renderStream(streamBEl, bValues);

    marginalAEl.innerHTML = marginalText(aValues);
    marginalBEl.innerHTML = marginalText(bValues);

    // ===== Toggle scatter vs count display según el modo =====
    const isQuantum = isQuantumMode(currentConfig.mode);
    const scatterEl = document.getElementById('scatter');
    const countDispEl = document.getElementById('countDisplay');
    const plotTitleEl = document.getElementById('plotTitle');
    const plotLegendEl = document.getElementById('plotLegend');

    if (isQuantum) {
      scatterEl.style.display = 'none';
      countDispEl.style.display = 'flex';
      plotTitleEl.textContent = 'Mediciones de pares · conteo';
      plotLegendEl.style.display = 'none';
      updateCountDisplay(completePairs);
    } else {
      scatterEl.style.display = 'block';
      countDispEl.style.display = 'none';
      plotTitleEl.textContent = 'Distribución conjunta · pares (A , B)';
      plotLegendEl.style.display = '';
      drawScatter(scatterEl, completePairs);
    }
  }

  function updateCountDisplay(pairs) {
    const total = pairs.length;
    let same = 0, opp = 0;
    for (const p of pairs) {
      if (p.a * p.b >= 0) same++;
      else opp++;
    }
    const pSame = total > 0 ? same / total : 0;
    const pOpp = total > 0 ? opp / total : 0;
    const eab = pSame - pOpp;

    document.getElementById('ctTotal').textContent = total;
    document.getElementById('ctSameN').textContent = same;
    document.getElementById('ctOppN').textContent = opp;
    document.getElementById('ctSamePct').textContent = `${Math.round(pSame * 100)}%`;
    document.getElementById('ctOppPct').textContent = `${Math.round(pOpp * 100)}%`;

    const barSame = document.getElementById('ctBarSame');
    const barOpp = document.getElementById('ctBarOpp');
    barSame.style.width = total > 0 ? `${pSame * 100}%` : '0%';
    barOpp.style.width = total > 0 ? `${pOpp * 100}%` : '0%';

    const labelSame = document.getElementById('ctBarSameLabel');
    const labelOpp = document.getElementById('ctBarOppLabel');
    if (total === 0) {
      labelSame.textContent = '—';
      labelSame.className = 'count-bar-inner empty';
      labelOpp.textContent = '—';
      labelOpp.className = 'count-bar-inner empty';
    } else {
      labelSame.textContent = pSame >= 0.08 ? `${Math.round(pSame * 100)}%` : '';
      labelSame.className = 'count-bar-inner';
      labelOpp.textContent = pOpp >= 0.08 ? `${Math.round(pOpp * 100)}%` : '';
      labelOpp.className = 'count-bar-inner';
    }

    const eabEl = document.getElementById('ctEab');
    eabEl.textContent = total > 0 ? (eab >= 0 ? '+' : '') + eab.toFixed(2) : '—';
    if (eab > 0.15) { eabEl.style.color = 'var(--positive)'; }
    else if (eab < -0.15) { eabEl.style.color = 'var(--negative)'; }
    else { eabEl.style.color = 'var(--accent)'; }
  }

  modeBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      const newMode = btn.dataset.mode;
      if (newMode === currentConfig.mode) return;
      if (!confirm(`Cambiar a "${modeNames[newMode]}"? Se reiniciarán los datos.`)) return;
      try {
        await set(configRef, { mode: newMode, resetAt: Date.now() });
        await remove(pairsRef);
      } catch (e) { console.error(e); }
    });
  });

  resetBtn.addEventListener('click', async () => {
    if (!confirm('¿Reiniciar todas las mediciones?')) return;
    try {
      await set(configRef, { ...currentConfig, resetAt: Date.now() });
      await remove(pairsRef);
    } catch (e) { console.error(e); }
  });

  ensureConfig();

  onValue(configRef, (snap) => {
    const v = snap.val();
    if (v) {
      currentConfig = { mode: v.mode || 'quantum_pos', resetAt: v.resetAt || 0 };
      setActiveMode(currentConfig.mode);
      allPairs = allPairs.filter(p => p.createdAt >= currentConfig.resetAt);
      updateDisplay();
    }
  });

  onValue(pairsRef, (snap) => {
    allPairs = parsePairs(snap, currentConfig.resetAt);
    updateDisplay();
  });

  window.addEventListener('resize', updateDisplay);
}

// ============================================================
// PARTICIPANTE
// ============================================================
function renderParticipant() {
  const group = getGroupAssignment();
  const groupName = group === 'A' ? 'Estación A' : 'Estación B';
  const groupClass = group === 'A' ? 'is-a' : 'is-b';
  const groupSymbol = group === 'A' ? 'a' : 'b';
  const partnerGroup = group === 'A' ? 'B' : 'A';

  document.getElementById('app').innerHTML = `
    <div class="participant">
      <div class="station-header ${groupClass}">
        <div class="small">Te asignamos a la</div>
        <div class="name">${groupName}</div>
        <div class="hint">Mides el espín de tu partícula</div>
      </div>

      <div class="mode-info">Estado actual · <span id="modeInfoLabel">cargando…</span></div>

      <div class="last-result empty" id="lastResult">
        <div class="label">Tu última medición</div>
        <div class="arrow"></div>
        <div class="value"></div>
      </div>

      <button class="measure-btn ${groupClass}" id="measureBtn">
        <span class="label">Toca para medir</span>
        MEDIR ESPÍN
      </button>

      <div class="my-stream">
        <div class="title">Tus mediciones (todas)</div>
        <div class="arrows" id="myArrows">—</div>
      </div>

      <div class="p-stats">
        <div class="p-stat">
          <div class="label">Tú</div>
          <div class="value ${groupSymbol}" id="myCount">0</div>
        </div>
        <div class="p-stat">
          <div class="label">Pares</div>
          <div class="value" id="totalPairs">0</div>
        </div>
        <div class="p-stat">
          <div class="label">ρ grupo</div>
          <div class="value" id="groupRho">—</div>
        </div>
      </div>

      <div class="switch-link">
        <button id="switchBtn">Cambiar a Estación ${partnerGroup}</button>
      </div>
    </div>
  `;

  const btn = document.getElementById('measureBtn');
  const lastResultEl = document.getElementById('lastResult');
  const myCountEl = document.getElementById('myCount');
  const totalPairsEl = document.getElementById('totalPairs');
  const groupRhoEl = document.getElementById('groupRho');
  const myArrowsEl = document.getElementById('myArrows');
  const modeInfoEl = document.getElementById('modeInfoLabel');
  const switchBtn = document.getElementById('switchBtn');

  const modeNames = {
    independent: 'independientes',
    classical_pos: 'clásico +',
    classical_neg: 'clásico −',
    quantum_pos: 'entrelazado |Φ+⟩',
    quantum_neg: 'singlete |Ψ−⟩'
  };

  switchBtn.addEventListener('click', () => {
    if (confirm(`¿Cambiar a Estación ${partnerGroup}? Tus mediciones actuales se mantienen.`)) switchGroup();
  });

  let currentConfig = { mode: 'quantum_pos', resetAt: 0 };
  let allPairs = [];

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    try {
      const result = await performMeasurement(group, currentConfig.mode);
      lastResultEl.classList.remove('empty');
      const arrow = lastResultEl.querySelector('.arrow');
      const val = lastResultEl.querySelector('.value');

      if (result.isQuantum) {
        // Modo cuántico: muestra una flecha del lado de su estación
        arrow.className = 'arrow ' + (result.a > 0 ? 'up' : 'down');
        arrow.textContent = result.a > 0 ? '↑' : '↓';
        val.textContent = result.a > 0 ? '+1' : '−1';
      } else {
        // Modo clásico: muestra ambos valores A y B
        arrow.className = 'arrow';
        arrow.style.fontSize = '24px';
        arrow.innerHTML = `<span style="color: var(--station-a)">A = ${result.a >= 0 ? '+' : ''}${result.a.toFixed(2)}</span>` +
                          `<span style="color: var(--text-faint); margin: 0 12px">·</span>` +
                          `<span style="color: var(--station-b)">B = ${result.b >= 0 ? '+' : ''}${result.b.toFixed(2)}</span>`;
        val.textContent = '';
      }

      if (navigator.vibrate) navigator.vibrate(30);
    } catch (err) {
      console.error(err);
    } finally {
      setTimeout(() => { btn.disabled = false; }, 200);
    }
  });

  function updateDisplay() {
    const myField = group === 'A' ? 'aClaimedBy' : 'bClaimedBy';
    const myAtField = group === 'A' ? 'aClaimedAt' : 'bClaimedAt';
    const myValField = group === 'A' ? 'a' : 'b';

    const myMeasurements = allPairs
      .filter(p => p[myField] === USER_ID)
      .sort((x, y) => (x[myAtField] || 0) - (y[myAtField] || 0))
      .map(p => p[myValField]);

    const completePairs = allPairs.filter(p => p.aClaimedBy && p.bClaimedBy);

    myCountEl.textContent = myMeasurements.length;
    totalPairsEl.textContent = completePairs.length;
    const r = pearsonDiscrete(completePairs);
    groupRhoEl.textContent = completePairs.length >= 2 ? formatRho(r) : '—';
    if (r > 0.15) groupRhoEl.style.color = 'var(--positive)';
    else if (r < -0.15) groupRhoEl.style.color = 'var(--negative)';
    else groupRhoEl.style.color = 'var(--text)';

    renderStream(myArrowsEl, myMeasurements, 32);
  }

  onValue(configRef, (snap) => {
    const v = snap.val();
    if (v) {
      currentConfig = { mode: v.mode || 'quantum_pos', resetAt: v.resetAt || 0 };
      modeInfoEl.textContent = modeNames[currentConfig.mode] || currentConfig.mode;

      // Mostrar/ocultar header de estación y stream según modo
      const stationHeader = document.querySelector('.station-header');
      const measureBtn = document.querySelector('.measure-btn');
      const myStream = document.querySelector('.my-stream');
      const groupRhoStat = groupRhoEl.parentElement;

      if (isQuantumMode(currentConfig.mode)) {
        if (stationHeader) stationHeader.style.display = '';
        if (measureBtn) {
          measureBtn.className = 'measure-btn ' + groupClass;
          measureBtn.querySelector('.label').textContent = 'Toca para medir';
        }
        if (myStream) myStream.style.display = '';
      } else {
        if (stationHeader) stationHeader.style.display = 'none';
        if (measureBtn) {
          measureBtn.className = 'measure-btn is-a';
          measureBtn.querySelector('.label').textContent = 'Toca para generar un par';
        }
        if (myStream) myStream.style.display = 'none';
      }

      allPairs = allPairs.filter(p => p.createdAt >= currentConfig.resetAt);
      updateDisplay();
    }
  });

  onValue(pairsRef, (snap) => {
    allPairs = parsePairs(snap, currentConfig.resetAt);
    updateDisplay();
  });
}

// ============================================================
// BOOT
// ============================================================
if (isParticipant) renderParticipant();
else renderPresenter();
</script>
</body>
</html>
