```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio de Correlaciones y Entrelazamiento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #0a0e14;
  --surface: #131820;
  --border: #1f2933;
  --text: #e6edf3;
  --text-dim: #8b97a8;
  --accent: #00d4ff;
  --positive: #4ade80;
  --negative: #f472b6;

  --font-display: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  padding:20px;
}

button{
  cursor:pointer;
}

.presenter{
  max-width:1400px;
  margin:auto;
}

.header{
  margin-bottom:20px;
}

.header h1{
  font-family:var(--font-display);
  font-size:48px;
  font-style:italic;
  font-weight:400;
}

.header em{
  color:var(--accent);
}

.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-bottom:20px;
}

.metric{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
  border-radius:6px;
}

.metric .label{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text-dim);
  margin-bottom:10px;
}

.metric .value{
  font-size:56px;
  font-family:var(--font-display);
}

.plot-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:20px;
  margin-bottom:20px;
}

.plot-title{
  font-family:var(--font-mono);
  color:var(--text-dim);
  margin-bottom:10px;
}

canvas{
  width:100%;
  height:500px;
  display:block;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.mode-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  padding:10px 18px;
  border-radius:4px;
  font-family:var(--font-mono);
}

.mode-btn.active{
  border-color:var(--accent);
  color:var(--accent);
}

  display:grid;

  gap:12px;

.ent-card{

  padding:16px;

</style>
</head>
<body>

<div class="presenter">

  <div class="header">
    <h1>Laboratorio de <em>Correlaciones</em></h1>
  </div>

  <div class="metrics">

    <div class="metric">
      <div class="label">Correlación ρ</div>
      <div class="value" id="rhoValue">0.00</div>
    </div>

    <div class="metric">
      <div class="label">Mediciones</div>
      <div class="value" id="countValue">0</div>
    </div>

    <div class="metric">
      <div class="label">Modo</div>
      <div class="value" id="modeLabel">+</div>
    </div>

  </div>

  <div class="plot-panel">

    <div class="plot-title">
      Scatter Plot (A,B)
    </div>

    <canvas id="scatter"></canvas>

  </div>

  <!-- ================================================= -->
  <!-- NUEVA SECCIÓN ENTRELAZAMIENTO -->
  <!-- ================================================= -->

  <div class="plot-panel">

    <div class="plot-title">
      Mediciones de Spin Entrelazado
    </div>

    <div class="ent-grid">

      <div class="ent-card">
        <div class="small">↑↑</div>
        <div class="big" id="uu">0</div>
      </div>

      <div class="ent-card">
        <div class="small">↑↓</div>
        <div class="big" id="ud">0</div>
      </div>

      <div class="ent-card">
        <div class="small">↓↑</div>
        <div class="big" id="du">0</div>
      </div>

      <div class="ent-card">
        <div class="small">↓↓</div>
        <div class="big" id="dd">0</div>
      </div>

    </div>

    <div class="corr-box">
      Correlación observada:
      <span id="entCorr">—</span>
    </div>

  </div>

  <div class="controls">

    <button class="mode-btn active" data-mode="independent">
      Independiente
    </button>

    <button class="mode-btn" data-mode="positive">
      Correlación +
    </button>

    <button class="mode-btn" data-mode="negative">
      Correlación −
    </button>

    <button class="mode-btn" data-mode="quantum">
      «Cuántica»
    </button>

    <button class="mode-btn" data-mode="entangled">
      Entrelazamiento
    </button>

  </div>

</div>

<script>

// =====================================================
// VARIABLES
// =====================================================

const canvas = document.getElementById('scatter');
const ctx = canvas.getContext('2d');

const rhoValue = document.getElementById('rhoValue');
const countValue = document.getElementById('countValue');
const modeLabel = document.getElementById('modeLabel');

const uuEl = document.getElementById('uu');
const udEl = document.getElementById('ud');
const duEl = document.getElementById('du');
const ddEl = document.getElementById('dd');
const entCorrEl = document.getElementById('entCorr');

let currentMode = 'independent';

let allPoints = [];

// =====================================================
// UTILIDADES
// =====================================================

function gauss(sigma){

  let u = 0;
  let v = 0;

  while(u === 0) u = Math.random();
  while(v === 0) v = Math.random();

  return sigma *
    Math.sqrt(-2 * Math.log(u)) *
    Math.cos(2 * Math.PI * v);
}

function clamp(x, lo, hi){
  return Math.max(lo, Math.min(hi, x));
}

// =====================================================
// GENERADOR
// =====================================================

function generatePair(mode){

  // ===================================================
  // ENTRELAZAMIENTO
  // ===================================================

  if(mode === 'entangled'){

    const spinA =
      Math.random() < 0.5 ? 1 : -1;

    const spinB = -spinA;

    return {
      a: spinA,
      b: spinB,
      spinA: spinA === 1 ? '↑' : '↓',
      spinB: spinB === 1 ? '↑' : '↓'
    };
  }

  // ===================================================
  // OTROS MODOS
  // ===================================================

  const a = (Math.random() * 2) - 1;

  let b;

  if(mode === 'independent'){

    b = (Math.random() * 2) - 1;

  }
  else if(mode === 'positive'){

    b = clamp(a + gauss(0.18), -1, 1);

  }
  else if(mode === 'negative'){

    b = clamp(-a + gauss(0.18), -1, 1);

  }
  else if(mode === 'quantum'){

    const sign =
      Math.random() < 0.5 ? 1 : -1;

    const magnitude =
      0.55 + Math.random() * 0.4;

    const aQ =
      sign * magnitude + gauss(0.05);

    const bQ =
      sign * magnitude + gauss(0.05);

    return {
      a: clamp(aQ, -1, 1),
      b: clamp(bQ, -1, 1)
    };
  }

  return {a,b};
}

// =====================================================
// PEARSON
// =====================================================

function pearson(points){

  const n = points.length;

  if(n < 2) return 0;

  let sa = 0;
  let sb = 0;
  let saa = 0;
  let sbb = 0;
  let sab = 0;

  for(const p of points){

    sa += p.a;
    sb += p.b;

    saa += p.a * p.a;
    sbb += p.b * p.b;

    sab += p.a * p.b;
  }

  const num =
    n * sab - sa * sb;

  const den =
    Math.sqrt(
      (n*saa - sa*sa) *
      (n*sbb - sb*sb)
    );

  if(den === 0) return 0;

  return num / den;
}

// =====================================================
// SCATTER
// =====================================================

function drawScatter(){

  const rect =
    canvas.getBoundingClientRect();

  canvas.width = rect.width;
  canvas.height = rect.height;

  const W = rect.width;
  const H = rect.height;

  ctx.clearRect(0,0,W,H);

  const pad = 40;

  ctx.strokeStyle =
    'rgba(255,255,255,0.1)';

  ctx.strokeRect(
    pad,
    pad,
    W - 2*pad,
    H - 2*pad
  );

  for(const p of allPoints){

    const x =
      pad +
      ((p.a + 1)/2) * (W - 2*pad);

    const y =
      pad +
      (1 - ((p.b + 1)/2)) *
      (H - 2*pad);

    ctx.beginPath();

    ctx.fillStyle = '#00d4ff';

    ctx.arc(x,y,4,0,Math.PI*2);

    ctx.fill();
  }
}

// =====================================================
// UPDATE DISPLAY
// =====================================================

function updateDisplay(){

  const r = pearson(allPoints);

  rhoValue.textContent =
    r.toFixed(2);

  countValue.textContent =
    allPoints.length;

  modeLabel.textContent =
    currentMode;

  // ===================================================
  // ENTRELAZAMIENTO
  // ===================================================

  let uu = 0;
  let ud = 0;
  let du = 0;
  let dd = 0;

  for(const p of allPoints){

    if(p.a > 0 && p.b > 0){
      uu++;
    }
    else if(p.a > 0 && p.b < 0){
      ud++;
    }
    else if(p.a < 0 && p.b > 0){
      du++;
    }
    else if(p.a < 0 && p.b < 0){
      dd++;
    }
  }

  uuEl.textContent = uu;
  udEl.textContent = ud;
  duEl.textContent = du;
  ddEl.textContent = dd;

  const total =
    uu + ud + du + dd;

  if(total > 0){

    const correlated =
      uu + dd;

    const anticorrelated =
      ud + du;

    const corr =
      ((anticorrelated - correlated)
      / total) * 100;

    entCorrEl.textContent =
      corr.toFixed(1)
      + '% anticorrelación';
  }

  drawScatter();
}

// =====================================================
// MODOS
// =====================================================

document
.querySelectorAll('.mode-btn')
.forEach(btn => {

  btn.addEventListener('click', () => {

    document
    .querySelectorAll('.mode-btn')
    .forEach(b =>
      b.classList.remove('active')
    );

    btn.classList.add('active');

    currentMode =
      btn.dataset.mode;
  });

});

// =====================================================
// GENERAR DATOS
// =====================================================

setInterval(() => {

  const p =
    generatePair(currentMode);

  allPoints.push(p);

  if(allPoints.length > 300){
    allPoints.shift();
  }

  updateDisplay();

}, 300);

// =====================================================

window.addEventListener(
  'resize',
  drawScatter
);

updateDisplay();

</script>

</body>
</html>
